<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圓周率乘法挑戰 - 國小數學</title>
    <!-- 引入 Tailwind CSS 進行響應式排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google 字體 (思源宋體) 以呈現中國風 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* 中國風視覺設計 */
        body {
            font-family: 'Noto Serif TC', serif;
            background-color: #f8f4e6; /* 宣紙色 */
            background-image: radial-gradient(#e5dec1 1px, transparent 1px);
            background-size: 20px 20px;
            color: #3b2e2a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }

        /* 古典邊框樣式 */
        .chinese-panel {
            background-color: #fffaf0;
            border: 2px solid #8b0000; /* 硃砂紅 */
            border-radius: 4px;
            padding: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            max-width: 500px;
            width: 100%;
            margin: 1rem auto;
        }

        .chinese-panel-inner {
            border: 1px solid #8b0000;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* 標題樣式 */
        .title-text {
            color: #8b0000;
            text-shadow: 1px 1px 0px #d4af37; /* 金色陰影 */
            letter-spacing: 0.1em;
            text-align: center;
        }

        /* 古典按鈕 */
        .btn-chinese {
            background-color: #8b0000;
            color: #f8f4e6;
            border: 2px solid #d4af37; /* 金色邊框 */
            padding: 0.5rem 2rem;
            font-size: 1.25rem;
            font-weight: 700;
            border-radius: 4px;
            transition: all 0.3s ease;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(139, 0, 0, 0.2);
        }

        .btn-chinese:hover {
            background-color: #a52a2a;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(139, 0, 0, 0.3);
        }

        .btn-chinese:disabled {
            background-color: #777;
            border-color: #999;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 輸入框樣式 */
        .input-chinese {
            border: none;
            border-bottom: 2px solid #8b0000;
            background: transparent;
            text-align: center;
            font-size: 1.25rem;
            color: #8b0000;
            font-weight: 700;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-chinese:focus {
            border-bottom: 2px solid #d4af37;
        }
        
        /* 隱藏數字輸入框的上下箭頭 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* 排行榜表格 */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .leaderboard-table th {
            border-bottom: 2px solid #8b0000;
            padding: 0.5rem;
            color: #8b0000;
        }
        .leaderboard-table td {
            border-bottom: 1px dashed #d4af37;
            padding: 0.5rem;
            text-align: center;
        }
        .rank-1 { color: #e6b800; font-weight: 900; font-size: 1.1rem; } /* 金 */
        .rank-2 { color: #a6a6a6; font-weight: bold; } /* 銀 */
        .rank-3 { color: #cd7f32; font-weight: bold; } /* 銅 */

        /* 隱藏區塊用 */
        .hidden { display: none !important; }
        
        /* 管理模式操作列 */
        .admin-col { display: none; }
        .admin-mode .admin-col { display: table-cell; }
        .btn-delete {
            background-color: #dc2626;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }
        .btn-delete:hover { background-color: #b91c1c; }

        /* 裝飾圖騰 */
        .decor-corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #8b0000;
        }
        .tl { top: -4px; left: -4px; border-right: none; border-bottom: none; }
        .tr { top: -4px; right: -4px; border-left: none; border-bottom: none; }
        .bl { bottom: -4px; left: -4px; border-right: none; border-top: none; }
        .br { bottom: -4px; right: -4px; border-left: none; border-top: none; }
    </style>
</head>
<body>

    <!-- 主容器 -->
    <div class="chinese-panel">
        <div class="decor-corner tl"></div>
        <div class="decor-corner tr"></div>
        <div class="decor-corner bl"></div>
        <div class="decor-corner br"></div>
        
        <div class="chinese-panel-inner" id="app-container">
            
            <!-- 載入中畫面 -->
            <div id="loading-screen" class="text-center py-10">
                <h1 class="text-2xl title-text mb-4">系統準備中...</h1>
                <p class="text-gray-600">正在連接至藏經閣（資料庫）</p>
            </div>

            <!-- 開始畫面 -->
            <div id="start-screen" class="hidden flex flex-col items-center">
                <h1 class="text-3xl font-black title-text mb-2">圓周率乘法挑戰</h1>
                <p class="text-md mb-8 text-center text-gray-700">挑戰 3.14 乘以 2 到 9 的計算速度！<br>請留下大名以記錄成績。</p>
                
                <div class="w-full mb-6 relative">
                    <label class="block text-lg font-bold mb-2 text-[#8b0000]" for="player-name">俠客姓名：</label>
                    <input type="text" id="player-name" class="input-chinese w-full text-left px-2" placeholder="請輸入您的姓名" maxlength="15">
                    <p id="name-error" class="text-red-500 text-sm mt-1 hidden">請務必填寫姓名才能開始挑戰！</p>
                </div>
                
                <button id="btn-start" class="btn-chinese mt-4">開始挑戰</button>
                <button id="btn-view-leaderboard" class="mt-4 text-[#8b0000] underline hover:text-[#a52a2a] transition">查看英雄榜</button>
            </div>

            <!-- 測驗畫面 -->
            <div id="quiz-screen" class="hidden flex flex-col">
                <div class="flex justify-between items-center border-b-2 border-[#8b0000] pb-2 mb-4">
                    <div class="text-lg font-bold text-[#8b0000]">姓名：<span id="display-name" class="text-[#3b2e2a]"></span></div>
                    <div class="text-lg font-bold text-[#8b0000]">時間：<span id="display-time" class="text-red-600">00:00</span></div>
                </div>

                <div id="questions-container" class="space-y-4 mb-6">
                    <!-- 題目將由 JavaScript 動態生成 -->
                </div>
                
                <p id="quiz-error" class="text-red-500 text-sm text-center mb-2 hidden">請完成所有題目後再繳卷！</p>
                <button id="btn-submit" class="btn-chinese">繳交考卷</button>
            </div>

            <!-- 結算與排行榜畫面 -->
            <div id="result-screen" class="hidden flex flex-col items-center">
                <h2 class="text-3xl font-black title-text mb-4" id="result-title">測驗完成</h2>
                
                <div class="bg-[#f0e6d2] w-full p-4 rounded border border-[#d4af37] mb-6 text-center shadow-inner">
                    <p class="text-lg mb-1">得分：<span id="final-score" class="text-3xl font-bold text-red-600"></span> 分</p>
                    <p class="text-lg">耗時：<span id="final-time" class="font-bold text-[#8b0000]"></span></p>
                </div>

                <h3 class="text-xl font-bold title-text mb-2">🏆 英雄榜 (Top 20) 🏆</h3>
                <div id="leaderboard-loading" class="text-sm text-gray-500 my-4">正在獲取最新榜單...</div>
                
                <div class="w-full overflow-x-auto">
                    <table class="leaderboard-table hidden" id="leaderboard-table">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>姓名</th>
                                <th>分數</th>
                                <th>時間</th>
                                <th class="admin-col text-red-600">操作</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <!-- 排行榜資料動態生成 -->
                        </tbody>
                    </table>
                </div>

                <button id="btn-restart" class="btn-chinese mt-6">再次挑戰</button>

                <!-- 管理員登入區塊 -->
                <div class="mt-6 flex flex-col items-center w-full">
                    <span id="admin-trigger" class="text-xs text-gray-400 cursor-pointer hover:text-[#8b0000] mb-2">管理員登入</span>
                    
                    <!-- 登入表單 -->
                    <div id="admin-login-area" class="hidden flex items-center space-x-2 bg-white p-2 rounded border border-[#e5dec1]">
                        <input type="password" id="admin-pwd" class="border border-gray-300 rounded px-2 py-1 w-32" placeholder="輸入密碼">
                        <button id="btn-admin-login" class="bg-[#3b2e2a] text-white px-3 py-1 rounded text-sm hover:bg-black transition">登入</button>
                    </div>

                    <!-- 登入後的操作與設定 -->
                    <div id="admin-settings-area" class="hidden flex flex-col items-center space-y-3 bg-white p-3 rounded border border-[#e5dec1] mt-2 shadow-sm">
                        <div class="flex items-center space-x-3">
                            <span class="text-sm font-bold text-[#8b0000]">⚔️ 管理員模式啟動</span>
                            <button id="btn-admin-logout" class="bg-gray-500 text-white px-3 py-1 rounded text-sm hover:bg-gray-600 transition">登出</button>
                        </div>
                        <div class="flex items-center space-x-2 border-t border-[#e5dec1] pt-3 w-full justify-center">
                            <input type="password" id="admin-new-pwd" class="border border-gray-300 rounded px-2 py-1 w-28 text-sm" placeholder="輸入新密碼">
                            <button id="btn-change-pwd" class="bg-[#d4af37] text-white px-3 py-1 rounded text-sm hover:bg-[#c5a028] transition whitespace-nowrap">修改密碼</button>
                        </div>
                        <p id="admin-msg" class="text-xs mt-1 hidden"></p>
                    </div>

                    <p id="admin-error" class="text-red-500 text-xs mt-1 hidden">密碼錯誤</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Firebase 模組與應用程式邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 設置 (全局變數由宿主環境提供)
     const firebaseConfig = {
  apiKey: "AIzaSyBji6nQifLAXNlbqOSQpQUZ17fgh8mpvPg",
  authDomain: "circle-2b076.firebaseapp.com",
  projectId: "circle-2b076",
  storageBucket: "circle-2b076.firebasestorage.app",
  messagingSenderId: "607347560539",
  appId: "1:607347560539:web:cae285ebb16228d51f2f7e"
};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-pi-app';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 狀態變數
        let currentUser = null;
        let playerName = "";
        let timerInterval = null;
        let startTime = 0;
        let timeElapsedMs = 0;
        let currentScore = 0;
        let dbCollectionName = "pi_challenge_leaderboard";
        
        // 管理模式變數
        let isAdmin = false;
        const ADMIN_SETTINGS_COLLECTION = "pi_challenge_settings";

        // DOM 元素
        const screens = {
            loading: document.getElementById('loading-screen'),
            start: document.getElementById('start-screen'),
            quiz: document.getElementById('quiz-screen'),
            result: document.getElementById('result-screen')
        };

        // 題目設定 (3.14 * 2 到 9)
        const questions = [
            { multiplier: 2, answer: 6.28 },
            { multiplier: 3, answer: 9.42 },
            { multiplier: 4, answer: 12.56 },
            { multiplier: 5, answer: 15.70 },
            { multiplier: 6, answer: 18.84 },
            { multiplier: 7, answer: 21.98 },
            { multiplier: 8, answer: 25.12 },
            { multiplier: 9, answer: 28.26 }
        ];

        // 1. 初始化與驗證
        async function initApp() {
            try {
                // 強制遵守 RULE 3：先認證再操作
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("認證失敗:", error);
                screens.loading.innerHTML = "<p class='text-red-500'>連線失敗，請重新整理網頁。</p>";
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                showScreen('start');
            }
        });

        // 2. 畫面切換控制
        function showScreen(screenName) {
            Object.values(screens).forEach(screen => screen.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
        }

        // 3. 遊戲邏輯：開始測驗
        document.getElementById('btn-start').addEventListener('click', () => {
            const nameInput = document.getElementById('player-name').value.trim();
            const errorMsg = document.getElementById('name-error');
            
            if (!nameInput) {
                errorMsg.classList.remove('hidden');
                return;
            }
            
            errorMsg.classList.add('hidden');
            playerName = nameInput;
            document.getElementById('display-name').innerText = playerName;
            
            // 將題目陣列隨機打亂 (Fisher-Yates 洗牌演算法)
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }
            
            generateQuiz();
            showScreen('quiz');
            startTimer();
        });

        function generateQuiz() {
            const container = document.getElementById('questions-container');
            container.innerHTML = ''; // 清空
            
            questions.forEach((q, index) => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between bg-white p-3 rounded shadow-sm border border-[#e5dec1]";
                row.innerHTML = `
                    <span class="text-xl font-bold ml-2">3.14 &times; ${q.multiplier} =</span>
                    <input type="number" step="0.01" id="ans-${index}" class="input-chinese w-32 ml-4" placeholder="請作答">
                `;
                container.appendChild(row);
            });
        }

        // 計時器邏輯
        function startTimer() {
            startTime = Date.now();
            const timeDisplay = document.getElementById('display-time');
            
            timerInterval = setInterval(() => {
                const now = Date.now();
                const diff = now - startTime;
                timeDisplay.innerText = formatTime(diff);
            }, 1000);
        }

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const seconds = (totalSeconds % 60).toString().padStart(2, '0');
            return `${minutes}:${seconds}`;
        }

        // 4. 遊戲邏輯：繳交與計分
        document.getElementById('btn-submit').addEventListener('click', async () => {
            const errorMsg = document.getElementById('quiz-error');
            
            // 檢查是否皆有填寫
            let allFilled = true;
            for (let i = 0; i < questions.length; i++) {
                if (document.getElementById(`ans-${i}`).value === "") {
                    allFilled = false;
                    break;
                }
            }

            if (!allFilled) {
                errorMsg.classList.remove('hidden');
                return;
            }
            errorMsg.classList.add('hidden');
            
            // 停止計時
            clearInterval(timerInterval);
            timeElapsedMs = Date.now() - startTime;
            
            // 計算分數 (每題12.5分)
            let correctCount = 0;
            questions.forEach((q, i) => {
                const userAns = parseFloat(document.getElementById(`ans-${i}`).value);
                // 處理浮點數誤差，差距小於 0.001 視為正確
                if (Math.abs(userAns - q.answer) < 0.001) {
                    correctCount++;
                }
            });
            
            currentScore = Math.round(correctCount * 12.5); // 四捨五入避免小數點問題，全對會是 100
            
            // 更新結算畫面
            document.getElementById('final-score').innerText = currentScore;
            document.getElementById('final-time').innerText = formatTime(timeElapsedMs);
            
            // 顯示畫面並儲存資料
            showScreen('result');
            await saveAndFetchLeaderboard();
        });

        // 5. Firebase 資料庫互動 (遵守 RULE 1 & 2)
        async function saveAndFetchLeaderboard() {
            if (!currentUser) return;
            
            document.getElementById('leaderboard-loading').classList.remove('hidden');
            document.getElementById('leaderboard-table').classList.add('hidden');
            document.getElementById('btn-restart').disabled = true;

            const timeString = formatTime(timeElapsedMs);

            try {
                // RULE 1: 使用公共資料嚴格路徑
                const collRef = collection(db, 'artifacts', appId, 'public', 'data', dbCollectionName);
                
                // 儲存目前成績
                await addDoc(collRef, {
                    name: playerName,
                    score: currentScore,
                    timeMs: timeElapsedMs,
                    timeStr: timeString,
                    timestamp: Date.now()
                });

                // 獲取所有資料以進行本地排序 (RULE 2: 不使用複合查詢)
                await fetchAndRenderLeaderboard(collRef);

            } catch (error) {
                console.error("儲存或獲取資料失敗:", error);
                document.getElementById('leaderboard-loading').innerText = "榜單讀取失敗，請確認網路狀態。";
            } finally {
                document.getElementById('btn-restart').disabled = false;
            }
        }

        async function fetchAndRenderLeaderboard(collRef) {
            const querySnapshot = await getDocs(collRef);
            let results = [];
            
            querySnapshot.forEach((docSnap) => {
                // 將文件 ID 一併儲存，以便後續刪除使用
                results.push({ id: docSnap.id, ...docSnap.data() });
            });

            // 本地排序：1. 分數高至低  2. 耗時少至多
            results.sort((a, b) => {
                if (b.score !== a.score) {
                    return b.score - a.score;
                }
                return a.timeMs - b.timeMs;
            });

            // 取前 20 名
            const top20 = results.slice(0, 20);
            renderLeaderboardTable(top20);
        }

        function renderLeaderboardTable(data) {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            
            data.forEach((entry, index) => {
                const rank = index + 1;
                const row = document.createElement('tr');
                
                // 排名樣式處理
                let rankClass = "";
                let rankIcon = rank;
                if (rank === 1) { rankClass = "rank-1"; rankIcon = "🥇 狀元"; }
                else if (rank === 2) { rankClass = "rank-2"; rankIcon = "🥈 榜眼"; }
                else if (rank === 3) { rankClass = "rank-3"; rankIcon = "🥉 探花"; }
                
                // 高亮當前玩家最新一筆 (簡單判斷名稱與時間相符)
                const isCurrentPlayer = (entry.name === playerName && entry.timeMs === timeElapsedMs && entry.score === currentScore);
                if (isCurrentPlayer) {
                    row.classList.add('bg-[#fdeed6]'); // 稍微高亮背景
                }

                // 防XSS處理
                const safeName = entry.name.replace(/</g, "&lt;").replace(/>/g, "&gt;");

                row.innerHTML = `
                    <td class="${rankClass}">${rankIcon}</td>
                    <td class="font-bold">${safeName}</td>
                    <td class="text-red-600 font-bold">${entry.score}</td>
                    <td>${entry.timeStr}</td>
                    <td class="admin-col"><button class="btn-delete" data-id="${entry.id}">刪除</button></td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('leaderboard-loading').classList.add('hidden');
            document.getElementById('leaderboard-table').classList.remove('hidden');

            // 依據管理狀態更新表格顯示
            toggleAdminUI();
        }

        // 7. 管理模式邏輯
        async function getAdminPassword() {
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', ADMIN_SETTINGS_COLLECTION, 'admin_config');
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() && docSnap.data().password) {
                    return docSnap.data().password;
                } else {
                    // 若尚未設定，預設為 pi314 並寫入資料庫
                    await setDoc(docRef, { password: "pi314" }, { merge: true });
                    return "pi314";
                }
            } catch (error) {
                console.error("無法取得密碼", error);
                return "pi314"; // 發生錯誤時的備用機制
            }
        }

        function toggleAdminUI() {
            const table = document.getElementById('leaderboard-table');
            const loginArea = document.getElementById('admin-login-area');
            const settingsArea = document.getElementById('admin-settings-area');
            const pwdInput = document.getElementById('admin-pwd');
            const msgEl = document.getElementById('admin-msg');
            
            if (isAdmin) {
                table.classList.add('admin-mode');
                loginArea.classList.add('hidden');
                settingsArea.classList.remove('hidden');
                msgEl.classList.add('hidden');
            } else {
                table.classList.remove('admin-mode');
                loginArea.classList.remove('hidden');
                settingsArea.classList.add('hidden');
                pwdInput.value = '';
            }
        }

        document.getElementById('admin-trigger').addEventListener('click', () => {
            if (!isAdmin) {
                document.getElementById('admin-login-area').classList.toggle('hidden');
            } else {
                document.getElementById('admin-settings-area').classList.toggle('hidden');
            }
            document.getElementById('admin-error').classList.add('hidden');
        });

        document.getElementById('btn-admin-login').addEventListener('click', async () => {
            const pwdInputBtn = document.getElementById('btn-admin-login');
            pwdInputBtn.innerText = "驗證中...";
            pwdInputBtn.disabled = true;
            
            const pwd = document.getElementById('admin-pwd').value;
            const correctPwd = await getAdminPassword();
            
            if (pwd === correctPwd) {
                isAdmin = true;
                document.getElementById('admin-error').classList.add('hidden');
                toggleAdminUI();
            } else {
                document.getElementById('admin-error').classList.remove('hidden');
            }
            
            pwdInputBtn.innerText = "登入";
            pwdInputBtn.disabled = false;
        });

        document.getElementById('btn-admin-logout').addEventListener('click', () => {
            isAdmin = false;
            toggleAdminUI();
            document.getElementById('admin-settings-area').classList.add('hidden');
        });

        // 變更密碼邏輯
        document.getElementById('btn-change-pwd').addEventListener('click', async () => {
            const newPwd = document.getElementById('admin-new-pwd').value.trim();
            const msgEl = document.getElementById('admin-msg');
            msgEl.classList.remove('hidden', 'text-green-600', 'text-red-500');
            
            if (!newPwd) {
                msgEl.innerText = "密碼不可為空！";
                msgEl.classList.add('text-red-500');
                return;
            }

            try {
                const btn = document.getElementById('btn-change-pwd');
                btn.innerText = "更新中...";
                btn.disabled = true;
                
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', ADMIN_SETTINGS_COLLECTION, 'admin_config');
                await setDoc(docRef, { password: newPwd }, { merge: true });
                
                msgEl.innerText = "密碼變更成功！";
                msgEl.classList.add('text-green-600');
                document.getElementById('admin-new-pwd').value = '';
                
                btn.innerText = "修改密碼";
                btn.disabled = false;
            } catch (error) {
                console.error("更新密碼失敗", error);
                msgEl.innerText = "更新失敗，請檢查網路。";
                msgEl.classList.add('text-red-500');
                document.getElementById('btn-change-pwd').innerText = "修改密碼";
                document.getElementById('btn-change-pwd').disabled = false;
            }
        });

        // 使用事件委派處理動態生成的刪除按鈕
        document.getElementById('leaderboard-body').addEventListener('click', async (e) => {
            if (e.target.classList.contains('btn-delete')) {
                const docId = e.target.getAttribute('data-id');
                // 使用原生的 Modal 替代 iframe 中可能被擋的 confirm，為求穩定這裡仍用 confirm，若無效則直接刪除
                // 但為了更好的體驗，建議使用自訂 UI Modal，此處先使用原生 confirm 示範
                if (window.confirm("確定要刪除這筆挑戰紀錄嗎？此動作無法復原。")) {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', dbCollectionName, docId);
                        await deleteDoc(docRef);
                        
                        // 重新讀取並渲染排行榜
                        document.getElementById('leaderboard-loading').classList.remove('hidden');
                        document.getElementById('leaderboard-table').classList.add('hidden');
                        const collRef = collection(db, 'artifacts', appId, 'public', 'data', dbCollectionName);
                        await fetchAndRenderLeaderboard(collRef);
                        alert("紀錄已刪除！");
                    } catch (error) {
                        console.error("刪除失敗:", error);
                        alert("刪除失敗，請檢查權限或網路連線。");
                    }
                }
            }
        });

        // 6. 其他按鈕邏輯
        document.getElementById('btn-restart').addEventListener('click', () => {
            showScreen('start');
            document.getElementById('player-name').value = ''; // 可清空或保留，這裡選擇清空讓下一位同學使用
        });

        document.getElementById('btn-view-leaderboard').addEventListener('click', async () => {
            showScreen('result');
            document.getElementById('result-title').innerText = "英雄榜";
            document.getElementById('result-title').nextElementSibling.classList.add('hidden'); // 隱藏個人分數區塊
            
            document.getElementById('leaderboard-loading').classList.remove('hidden');
            document.getElementById('leaderboard-table').classList.add('hidden');

            if (currentUser) {
                 const collRef = collection(db, 'artifacts', appId, 'public', 'data', dbCollectionName);
                 await fetchAndRenderLeaderboard(collRef);
            }
        });

        // 程式進入點
        initApp();

    </script>
</body>
</html>
